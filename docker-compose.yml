version: '3.9'

# ============================================================
#  Eka Automation — Docker Compose
#  Services:
#    eka-core        → Core app (Devices, Dashboard, Logs, Terminal)
#    eka-execute     → Execute tab (SpyTest, script execution)
#    eka-vs          → VS Manager tab (virsh, VM lifecycle)
#    eka-hardware    → Hardware Load tab (ONIE, telnet)
#    eka-nginx       → API Gateway (routes to correct service)
#
#  Database: uses host PostgreSQL via host.docker.internal
#  Set DATABASE_URL in .env to override (see .env.docker template)
# ============================================================

networks:
  eka-network:
    driver: bridge

volumes:
  eka_logs:           # Shared execution logs volume
  eka_images:         # Shared images volume

services:

  # ── Core Monolith (Devices + Dashboard + Logs + Terminal) ─────────────────
  eka-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eka-core
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL:           ${DATABASE_URL:-postgresql://eka_user:eka_password@host.docker.internal:5432/eka_automation}
      SECRET_KEY:             ${SECRET_KEY:-eka-secret-key-change-in-production}
      ONEPALC_ENABLED:        ${ONEPALC_ENABLED:-false}
      ONEPALC_HUB_AUTH_URL:   ${ONEPALC_HUB_AUTH_URL:-}
      ONEPALC_APP_NAME:       ${ONEPALC_APP_NAME:-Eka-Automation}
      ONEPALC_CALLBACK_URL:   ${ONEPALC_CALLBACK_URL:-}
      ONEPALC_ROLE_KEY:       ${ONEPALC_ROLE_KEY:-EKA}
      ONEPALC_API_TOKEN:      ${ONEPALC_API_TOKEN:-}
      ONEPALC_JWT_SECRET:     ${ONEPALC_JWT_SECRET:-}
      ONEPALC_PUBLIC_KEY:     ${ONEPALC_PUBLIC_KEY:-}
    volumes:
      - eka_logs:/app/data/logs
      - eka_images:/app/data/images
    networks:
      - eka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Execute Service (Execute Tab — SpyTest & Script Execution) ────────────
  eka-execute:
    build:
      context: services/execute-service
      dockerfile: Dockerfile
    container_name: eka-execute
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://eka_user:eka_password@host.docker.internal:5432/eka_automation}
      SPYTEST_BASE: ${SPYTEST_BASE:-/home/hp_test/Eka/sonic-mgmt/spytest}
    volumes:
      - eka_logs:/app/data/logs
    networks:
      - eka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── VS Manager Service (VS Manager Tab — virsh VM Lifecycle) ──────────────
  eka-vs:
    build:
      context: services/vs-service
      dockerfile: Dockerfile
    container_name: eka-vs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL:    ${DATABASE_URL:-postgresql://eka_user:eka_password@host.docker.internal:5432/eka_automation}
      VS_SOURCE_IMAGE: ${VS_SOURCE_IMAGE:-/home/hp/anuradha_build_imgs/target/sonic-vs.img}
    networks:
      - eka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Hardware Load Service (Hardware Tab — Telnet + ONIE) ──────────────────
  eka-hardware:
    build:
      context: services/hardware-service
      dockerfile: Dockerfile
    container_name: eka-hardware
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://eka_user:eka_password@host.docker.internal:5432/eka_automation}
    networks:
      - eka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx API Gateway ─────────────────────────────────────────────────────
  eka-nginx:
    image: nginx:1.25-alpine
    container_name: eka-nginx
    ports:
      - "8000:8000"      # Main access point: http://172.26.1.126:8000
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      eka-core:
        condition: service_healthy
      eka-execute:
        condition: service_healthy
      eka-vs:
        condition: service_healthy
      eka-hardware:
        condition: service_healthy
    networks:
      - eka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
