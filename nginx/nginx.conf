events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Upstream services
    upstream core_app      { server eka-core:8000; }
    upstream execute_svc   { server eka-execute:8002; }
    upstream vs_svc        { server eka-vs:8003; }
    upstream hardware_svc  { server eka-hardware:8005; }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8000;
        server_name _;

        client_max_body_size 500M;

        # ── Frontend (static files served by core) ──────────────────────────
        location / {
            proxy_pass         http://core_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Execute Service ─────────────────────────────────────────────────
        # Compare, dashboard, excel — served by core (must be before /api/executions prefix)
        location = /api/executions/compare {
            proxy_pass         http://core_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 300s;
        }

        location ~ ^/api/executions/[0-9]+/(dashboard|excel)$ {
            proxy_pass         http://core_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 300s;
        }

        # Execution Jobs (scheduler, reports, conflict check)
        location /api/execution-jobs {
            proxy_pass         http://execute_svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 300s;
        }

        # Live execution queue state
        location /api/execution-queue {
            proxy_pass         http://execute_svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
        }

        # Execution CRUD and logs
        location /api/executions {
            proxy_pass         http://execute_svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 300s;
        }

        # SpyTest start/stop/queue/scripts
        location /api/spytest {
            proxy_pass         http://execute_svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 3600s;
        }

        # Topology connections (used by Execute tab canvas)
        location /api/topology {
            proxy_pass         http://execute_svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
        }

        # Execute WebSocket for real-time log streaming
        location /ws/execution {
            proxy_pass         http://execute_svc;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 3600s;
        }

        # ── VS Manager Service ──────────────────────────────────────────────
        location /api/vs {
            proxy_pass         http://vs_svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 600s;
        }

        # VS Manager WebSocket (for image update progress)
        location /ws/vs {
            proxy_pass         http://vs_svc;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 600s;
        }

        # ── Hardware Load Service ───────────────────────────────────────────
        location /api/hardware-load {
            proxy_pass         http://hardware_svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 3600s;
        }

        # Hardware Load WebSocket (real-time ONIE progress)
        location /api/hardware-load/ws {
            proxy_pass         http://hardware_svc;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
        }

        # Terminal WebSocket (must be before generic /api block)
        location /api/terminal/ws {
            proxy_pass         http://core_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 3600s;
        }

        # ── Core App (everything else — Devices, Logs, Terminal, Dashboard) ─
        # /api/duts, /api/sessions, /api/terminal, /api/git, etc.
        location /api {
            proxy_pass         http://core_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Session-ID $http_x_session_id;
            proxy_read_timeout 300s;
        }

        # Core WebSockets (PTY terminal fallback)
        location /ws {
            proxy_pass         http://core_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
        }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
