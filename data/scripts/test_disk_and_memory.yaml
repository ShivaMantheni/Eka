# scripts/test_disk_and_memory.yaml
name: disk_and_memory_check
version: "1.0"
description: Check disk usage and memory status

metadata:
  author: Test Team
  created: 2026-02-24

test_cases:
  - name: disk_usage
    description: Check disk space
    timeout: 30
    commands:
      - df -h
      - du -sh /tmp 2>/dev/null || echo "/tmp not accessible"

  - name: memory_status
    description: Check memory usage
    timeout: 30
    commands:
      - free -h 2>/dev/null || cat /proc/meminfo
      - cat /proc/loadavg

  - name: process_check
    description: List top processes
    timeout: 30
    commands:
      - ps aux --sort=-%mem | head -10
